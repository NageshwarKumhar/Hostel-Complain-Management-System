<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>
<link rel="stylesheet" href="/css/dashboard.css">

</head>

<body>

</div>

<script src="/js/admin.js"></script>
<script>
	function logout(){
	localStorage.clear();
	window.location.href="/";
	}
</script>

</html>
