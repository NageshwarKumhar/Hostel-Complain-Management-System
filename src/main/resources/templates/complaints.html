<!DOCTYPE html>
<html>
<head>

<title>Complaints</title>
<link rel="stylesheet" href="/css/dashboard.css">

</head>

<body>

<div class="sidebar">
<h2>Hostel System</h2>

<ul>
<li onclick="location.href='/dashboard'">Dashboard</li>
<li onclick="location.href='/submit'">Submit Complaint</li>
<li onclick="location.href='/complaints-page'">View Complaints</li>
</ul>

</div>

<div class="main">

<h1>All Complaints</h1>

<table>

<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Description</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody>
    <tr th:each="complaint : ${complaints}">
        <td th:text="${complaint.id}"></td>
        <td th:text="${complaint.title}"></td>
        <td th:text="${complaint.description}"></td>
        <td th:text="${complaint.status}"></td>
        <td>
            <button th:if="${complaint.status == 'Pending'}" 
                    th:onclick="'location.href=\'/update-status/' + ${complaint.id} + '/Resolved\''">
                Mark Resolved
            </button>
        </td>
    </tr>
</tbody>

</table>

</div>

<script src="/js/view.js"></script>
</body>
</html>
